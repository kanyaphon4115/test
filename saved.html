<!DOCTYPE html>
<html>
<head>
  <title>ข่าวที่บันทึก</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen">

<div id="navbar"></div>

<header class="bg-gradient-to-r from-sky-600 to-blue-500 text-white py-12 shadow-lg">
  <div class="max-w-6xl mx-auto px-6">
    <h1 class="text-4xl font-bold">ข่าวที่บันทึก</h1>
  </div>
</header>

<main class="max-w-6xl mx-auto px-6 py-10">
  <div id="savedContainer" class="grid gap-6 sm:grid-cols-2 xl:grid-cols-3"></div>
  <div id="pagination" class="flex flex-wrap justify-center gap-2 mt-8"></div>
  <div id="emptyState" class="hidden text-center mt-10 text-gray-500">
    ยังไม่มีข่าวที่บันทึก
  </div>
</main>

<!-- ✅ MODAL ยืนยันลบ -->
<div id="confirmModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
  <div class="bg-white rounded-2xl p-6 w-80 text-center shadow-xl">
    <h2 class="text-lg font-semibold mb-4">ยืนยันการลบ</h2>
    <p class="text-gray-600 mb-6">ต้องการลบการบันทึกข่าวนี้?</p>

    <div class="flex justify-center gap-4">
      <button onclick="closeModal()" class="px-4 py-2 rounded bg-gray-200">
        ยกเลิก
      </button>
      <button id="confirmDeleteBtn" class="px-4 py-2 rounded bg-red-500 text-white">
        ลบ
      </button>
    </div>
  </div>
</div>

<script src="navbar.js"></script>

<script>
if (!localStorage.getItem("login")) {
  window.location.href = "login.html";
}

let currentUserId = Number(localStorage.getItem("userId"));
let currentPage = 1;
const pageSize = 9;
let totalPages = 1;

loadNavbar();
loadSaved();

async function loadSaved(page = 1) {
  currentPage = page;
  const userId = localStorage.getItem("userId") || (localStorage.getItem("login") ? JSON.parse(localStorage.getItem("login")).id : null);
  const res = await fetch(`http://localhost:3000/saved-news?user_id=${userId}&page=${page}&pageSize=${pageSize}`);

  if (!res.ok) {
    console.error('saved-news error', res.status, await res.text());
    document.getElementById("savedContainer").innerHTML = "";
    document.getElementById("pagination").innerHTML = "";
    document.getElementById("emptyState").classList.remove("hidden");
    return;
  }

  const result = await res.json();
  const data = Array.isArray(result) ? result : result.data || [];

  if (!Array.isArray(result)) {
    totalPages = Number(result.totalPages) || 1;
  } else {
    totalPages = 1;
  }

  const container = document.getElementById("savedContainer");
  const emptyState = document.getElementById("emptyState");
  const pagination = document.getElementById("pagination");

  if (!data.length) {
    container.innerHTML = "";
    pagination.innerHTML = "";
    emptyState.classList.remove("hidden");
    return;
  }

  emptyState.classList.add("hidden");
  container.innerHTML = data.map(n => `
    <article id="savedCard-${n.id}"
      onclick="goToNews(${n.id})"
      class="group cursor-pointer overflow-hidden rounded-2xl bg-white shadow hover:shadow-xl">

      <div class="relative">
        <img src="${n.image ? 'assets/images/' + n.image : 'https://via.placeholder.com/600x360'}"
          class="h-52 w-full object-cover">

        <!-- ปุ่ม 3 จุด -->
        <div class="absolute top-3 right-3">
          <button onclick="toggleMenu(event, ${n.id})"
            class="bg-white px-2 py-1 rounded-full shadow">
            ⋮
          </button>

          <div id="menu-${n.id}" class="hidden absolute right-0 mt-2 w-32 bg-white rounded shadow">
            ${n.user_id == currentUserId ? `<button onclick="event.stopPropagation(); editNews(${n.id})" class="block w-full text-left px-4 py-2 hover:bg-gray-100">✏️ แก้ไข</button>` : ''}
            <button onclick="event.stopPropagation(); unsave(${n.id})"
              class="block w-full text-left px-4 py-2 text-red-500 hover:bg-gray-100">
              🗑 ลบ
            </button>
          </div>
        </div>
      </div>

      <div class="p-4">
        <h2 class="font-bold">${n.title}</h2>
        <p class="text-sm text-gray-500">${n.content.substring(0, 80)}...</p>

        <a href="news.html?id=${n.id}"
           onclick="event.stopPropagation()"
           class="inline-block mt-3 text-blue-500">
          อ่านต่อ
        </a>
      </div>

    </article>
  `).join("");

  renderSavedPagination();
}

function renderSavedPagination() {
  const pagination = document.getElementById("pagination");
  if (totalPages <= 1) {
    pagination.innerHTML = "";
    return;
  }

  const groupStart = Math.floor((currentPage - 1) / 3) * 3 + 1;
  const groupEnd = Math.min(groupStart + 2, totalPages);

  let html = `
    <button onclick="changeSavedPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}
      class="px-4 py-2 rounded-lg bg-slate-200 text-slate-700 ${currentPage === 1 ? 'opacity-50 cursor-not-allowed' : 'hover:bg-slate-300'}">
      ก่อนหน้า
    </button>
  `;

  for (let p = groupStart; p <= groupEnd; p++) {
    html += `
      <button onclick="changeSavedPage(${p})"
        class="px-4 py-2 rounded-lg border border-slate-200 ${p === currentPage ? 'bg-blue-600 text-white' : 'bg-white text-slate-700 hover:bg-slate-100'}">
        ${p}
      </button>
    `;
  }

  html += `
    <button onclick="changeSavedPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}
      class="px-4 py-2 rounded-lg bg-slate-200 text-slate-700 ${currentPage === totalPages ? 'opacity-50 cursor-not-allowed' : 'hover:bg-slate-300'}">
      ถัดไป
    </button>
  `;

  pagination.innerHTML = html;
}

function changeSavedPage(page) {
  if (page < 1 || page > totalPages) return;
  loadSaved(page);
}

// ไปหน้า news
function goToNews(id) {
  window.location.href = `news.html?id=${id}`;
}

// ไปหน้า edit
function editNews(id) {
  window.location.href = `edit.html?id=${id}`;
}

// เปิด/ปิดเมนู
function toggleMenu(e, id) {
  e.stopPropagation();

  document.querySelectorAll("[id^='menu-']").forEach(m => m.classList.add("hidden"));
  document.getElementById(`menu-${id}`).classList.toggle("hidden");
}

// ปิดเมนูเมื่อคลิกที่อื่น
document.addEventListener("click", () => {
  document.querySelectorAll("[id^='menu-']").forEach(m => m.classList.add("hidden"));
});

// ================== MODAL ==================
let deleteId = null;

function unsave(id) {
  deleteId = id;
  document.getElementById("confirmModal").classList.remove("hidden");
}

function closeModal() {
  document.getElementById("confirmModal").classList.add("hidden");
  deleteId = null;
}

// กดปุ่ม "ลบ"
document.getElementById("confirmDeleteBtn").onclick = async () => {
  if (!deleteId) return;

  const userId = localStorage.getItem("userId");

  await fetch("http://localhost:3000/unsave", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ user_id: userId, news_id: deleteId })
  });

  // ลบการ์ด + animation
  const card = document.getElementById(`savedCard-${deleteId}`);
  if (card) {
    card.style.transition = "0.3s";
    card.style.opacity = "0";
    setTimeout(() => card.remove(), 300);
  }

  closeModal();

  const container = document.getElementById("savedContainer");
  if (!container.querySelector("article")) {
    document.getElementById("emptyState").classList.remove("hidden");
  }
};
</script>

</body>
</html>
