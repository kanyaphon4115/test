<!DOCTYPE html>
<html>
<head>
  <title>โปรไฟล์</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-blue-100 to-gray-100 min-h-screen">

<div id="navbar"></div>

<!-- Profile Card -->
<div class="max-w-md mx-auto mt-16">
  <div class="bg-white rounded-2xl shadow-xl p-6 text-center relative">

    <!-- Avatar -->
    <div class="absolute -top-16 left-1/2 transform -translate-x-1/2 cursor-pointer">
  
  <img id="profileAvatar"
    src="https://via.placeholder.com/120?text=Avatar"
    class="w-28 h-28 rounded-full object-cover border-4 border-white shadow-lg hover:opacity-80 transition">

  <!-- 🔥 เพิ่มอันนี้ -->
  <input type="file" id="avatarFile" accept="image/*" class="hidden">

</div>

    <!-- Content -->
    <div class="mt-14">
      <h2 class="text-2xl font-bold text-gray-800 mb-1" id="name">Loading...</h2>
      <p class="text-gray-500 text-sm mb-4" id="email">Loading...</p>

      <!-- Info Box -->
      <div class="bg-gray-50 rounded-lg p-4 space-y-4">
        <input id="editName" class="w-full border p-2 rounded" placeholder="ชื่อ">
        <input id="editEmail" class="w-full border p-2 rounded" placeholder="อีเมล">
      </div>

      <div id="messageBox" class="hidden bg-green-50 border border-green-200 text-green-800 rounded-lg p-4 mt-4 text-center"></div>

      <div class="flex flex-col gap-3 mt-6 sm:flex-row sm:justify-center">
        <button onclick="updateProfile()"
          class="bg-green-500 text-white px-4 py-2 rounded-lg hover:bg-green-600 transition">
          💾 บันทึก
        </button>

        <button onclick="deleteAccount()"
          class="bg-red-500 text-white px-4 py-2 rounded-lg hover:bg-red-600 transition">
          🗑️ ลบบัญชี
        </button>

      </div>
      <!-- Buttons -->
    </div>

  </div>
</div>

<script src="navbar.js"></script>
<script>

// 🔐 เช็ค login
if (!localStorage.getItem("login")) {
  window.location.href = "login.html";
}


// 🏠 กลับหน้าแรก
function goHome() {
  window.location.href = "index.html";
}

// 🚪 logout
function logout() {
  localStorage.removeItem("login");
  localStorage.removeItem("userId");
  localStorage.removeItem("userName");
  localStorage.removeItem("userEmail");
  window.location.href = "login.html";
}

loadNavbar();
loadProfile();

// โหลดข้อมูลลง input
async function loadProfile() {
  const userId = localStorage.getItem("userId");
  const storedLogin = localStorage.getItem("login");
  const localData = storedLogin ? JSON.parse(storedLogin) : null;

  if (localData) {
    document.getElementById("name").textContent = localData.name || "Loading...";
    document.getElementById("email").textContent = localData.email || "";
    document.getElementById("editName").value = localData.name || "";
    document.getElementById("editEmail").value = localData.email || "";
    if (localData.avatar) {
      document.getElementById("profileAvatar").src = localData.avatar;
    }
  }

  if (!userId) return;

  const res = await fetch(`http://localhost:3000/profile?user_id=${userId}`);
  if (!res.ok) {
    return;
  }

  const data = await res.json();

  document.getElementById("name").textContent = data.name;
  document.getElementById("email").textContent = data.email;
  document.getElementById("editName").value = data.name;
  document.getElementById("editEmail").value = data.email;
  document.getElementById("profileAvatar").src = data.avatar || "https://via.placeholder.com/120?text=Avatar";

  localStorage.setItem("userName", data.name);
  localStorage.setItem("userEmail", data.email);
  const loginObj = localData || {};
  loginObj.name = data.name;
  loginObj.email = data.email;
  loginObj.avatar = data.avatar || loginObj.avatar || "";
  localStorage.setItem("login", JSON.stringify(loginObj));
}

// 💾 update
async function updateProfile() {
  const userId = localStorage.getItem("userId");
  const name = document.getElementById("editName").value.trim();
  const email = document.getElementById("editEmail").value.trim();
const avatar = uploadedAvatar || document.getElementById("profileAvatar").src;
  if (!name || !email) {
    showMessage("กรุณากรอกชื่อและอีเมล", "red");
    return;
  }

  const res = await fetch("http://localhost:3000/update-profile", {
    method: "PUT",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ user_id: userId, name, email, avatar })
  });

  const text = await res.text();
  if (!res.ok) {
    showMessage(text, "red");
    return;
  }

  localStorage.setItem("userName", name);
  localStorage.setItem("userEmail", email);
  const loginData = localStorage.getItem("login");
  try {
    const loginObj = loginData ? JSON.parse(loginData) : {};
    loginObj.name = name;
    loginObj.email = email;
    loginObj.avatar = avatar;
    localStorage.setItem("login", JSON.stringify(loginObj));
  } catch (err) {
    // ignore
  }

  showMessage("บันทึกแล้วเรียบร้อย 🎉", "green");
  document.getElementById("profileAvatar").src = avatar || "https://via.placeholder.com/120?text=Avatar";
  loadNavbar();
}

function showMessage(message, color) {
  const box = document.getElementById("messageBox");
  box.textContent = message;
  box.classList.remove("hidden", "bg-green-50", "border-green-200", "text-green-800", "bg-red-50", "border-red-200", "text-red-800");
  if (color === "red") {
    box.classList.add("bg-red-50", "border-red-200", "text-red-800");
  } else {
    box.classList.add("bg-green-50", "border-green-200", "text-green-800");
  }
}

async function deleteAccount() {
  const confirmed = confirm("ยืนยันลบบัญชีของคุณ? การลบจะไม่สามารถย้อนกลับได้");
  if (!confirmed) return;

  const userId = localStorage.getItem("userId");
  const res = await fetch("http://localhost:3000/delete-account", {
    method: "DELETE",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ user_id: userId })
  });

  const text = await res.text();
  if (!res.ok) {
    showMessage(text, "red");
    return;
  }

  localStorage.removeItem("login");
  localStorage.removeItem("userId");
  localStorage.removeItem("userName");
  localStorage.removeItem("userEmail");
  alert(text);
  window.location.href = "login.html";
}
// 👉 คลิกที่รูป = เปิดไฟล์
document.getElementById("profileAvatar").onclick = () => {
  document.getElementById("avatarFile").click();
};

let uploadedAvatar = "";

// 👉 เลือกรูป
document.getElementById("avatarFile").addEventListener("change", async function() {
  const file = this.files[0];
  if (!file) return;

  // preview
  const reader = new FileReader();
  reader.onload = function(e) {
    document.getElementById("profileAvatar").src = e.target.result;
  };
  reader.readAsDataURL(file);

  // upload ไป server
  const formData = new FormData();
  formData.append("avatar", file);

  const res = await fetch("http://localhost:3000/upload-avatar", {
    method: "POST",
    body: formData
  });

  const data = await res.json();
  uploadedAvatar = data.url;
});
</script>

</body>
</html>
