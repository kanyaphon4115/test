<!DOCTYPE html>
<html>
<head>
  <title>เขียนข่าว</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

<div id="navbar"></div>

<script src="navbar.js"></script>

<div class="max-w-2xl mx-auto mt-10 bg-white p-6 rounded-xl shadow-lg">
  <h2 class="text-2xl font-bold mb-4">เขียนข่าวใหม่</h2>
<div id="successBox" 
     class="hidden bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded mb-4 text-center">
  บันทึกแล้วเรียบร้อย 🎉
</div>
  <div class="mb-4">
    <label class="block mb-1">หัวข้อ</label>
    <input id="title" class="w-full border p-2 rounded" placeholder="กรอกหัวข้อข่าว">
  </div>

  <div class="mb-4">
    <label class="block mb-1">เนื้อหา</label>
    <textarea id="content" class="w-full border p-2 rounded" rows="6" placeholder="กรอกเนื้อหา"></textarea>
  </div>

  <div class="mb-4">
    <label class="block mb-1">ลิงก์รูปภาพ (ไม่จำเป็น)</label>
<input id="image" type="file" accept="image/*" class="w-full border p-2 rounded">
  </div>

  <button onclick="postNews()" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">โพสต์ข่าว</button>
</div>

<script>
if (!localStorage.getItem("login")) {
  window.location.href = "login.html";
}

async function postNews() {
  const userId = localStorage.getItem("userId");
  const title = document.getElementById("title").value.trim();
  const content = document.getElementById("content").value.trim();
  const imageFile = document.getElementById("image").files[0];

  if (!title || !content) {
    alert("กรอกหัวข้อและเนื้อหา");
    return;
  }

  const formData = new FormData();
  formData.append("user_id", userId);
  formData.append("title", title);
  formData.append("content", content);

  if (imageFile) {
    formData.append("image", imageFile);
  }

  const res = await fetch("http://localhost:3000/post-news", {
    method: "POST",
    body: formData
  });

  const text = await res.text();
if (res.ok) {
  // 🔥 แสดงกล่องเขียว
  document.getElementById("successBox").classList.remove("hidden");

  // 🔥 ไม่ใช้ alert แล้ว

  // 🔥 รอแล้วค่อยเปลี่ยนหน้า
  setTimeout(() => {
    window.location.href = "index.html";
  }, 1500);

} else {
  alert(text); // error ยังใช้ alert ได้
}
}
function logout() {
  localStorage.removeItem("login");
  localStorage.removeItem("userId");
  window.location.href = "login.html";
}

loadNavbar();
</script>
</body>
</html>
