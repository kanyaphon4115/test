<!DOCTYPE html>
<html>
<head>
  <title>แก้ไขข่าว</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div id="navbar"></div>
<script src="navbar.js"></script>

<div class="max-w-2xl mx-auto mt-10 bg-white p-6 rounded-xl shadow-lg">
  <h2 class="text-2xl font-bold mb-4">แก้ไขข่าว</h2>
<div id="successBox" 
       class="hidden bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded mb-4 text-center">
    บันทึกแล้วเรียบร้อย 🎉
  </div>
  <div class="mb-4">
    <label>หัวข้อ</label>
    <input id="title" class="w-full border p-2 rounded">
  </div>

  <div class="mb-4">
    <label>เนื้อหา</label>
    <textarea id="content" class="w-full border p-2 rounded" rows="6"></textarea>
  </div>

  <div class="mb-4">
    <label>รูปปัจจุบัน</label>
    <img id="currentImagePreview" src="https://via.placeholder.com/600x300?text=No+Image" alt="Current Image"
      class="w-full h-48 object-cover rounded mb-3">
    <label>เปลี่ยนรูป (ไม่จำเป็น)</label>
    <input id="image" type="file" class="w-full border p-2 rounded">
  </div>

  <button onclick="updateNews()" 
    class="bg-green-500 text-white px-4 py-2 rounded hover:bg-green-600">
    💾 บันทึกการแก้ไข
  </button>
</div>

<script>
// 🔥 เอา id จาก URL
const urlParams = new URLSearchParams(window.location.search);
const newsId = urlParams.get("id");

if (!newsId) {
  alert("ไม่พบรหัสข่าว");
  window.location.href = "index.html";
}

// โหลด navbar
loadNavbar();

// 🔥 โหลดข้อมูลข่าวเดิม
async function loadNewsDetail() {
  const res = await fetch(`http://localhost:3000/news/${newsId}`);
  if (!res.ok) {
    alert(await res.text());
    window.location.href = "index.html";
    return;
  }

  const data = await res.json();

  document.getElementById("title").value = data.title;
  document.getElementById("content").value = data.content;
document.getElementById("currentImagePreview").src =
  data.image && data.image !== ""
    ? "assets/images/" + data.image
    : "https://via.placeholder.com/600x300?text=No+Image";}

loadNewsDetail();

// preview รูปใหม่เมื่อเลือก
const imageInput = document.getElementById("image");
imageInput.addEventListener("change", function() {
  const file = this.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    document.getElementById("currentImagePreview").src = e.target.result;
  };
  reader.readAsDataURL(file);
});

// 🔥 update ข่าว
async function updateNews() {
  const title = document.getElementById("title").value.trim();
  const content = document.getElementById("content").value.trim();
  const imageFile = document.getElementById("image").files[0];

  if (!title || !content) {
    alert("กรอกข้อมูลให้ครบ");
    return;
  }

  const storedLogin = localStorage.getItem("login");
  const user = storedLogin ? JSON.parse(storedLogin) : null;
  const userId = Number(localStorage.getItem("userId")) || (user && Number(user.id));

  if (!userId) {
    alert("กรุณา login");
    return;
  }

  const formData = new FormData();
  formData.append("id", newsId);
  formData.append("user_id", userId);
  formData.append("title", title);
  formData.append("content", content);

  if (imageFile) {
    formData.append("image", imageFile);
  }

  const res = await fetch("http://localhost:3000/update-news", {
    method: "POST",
    body: formData
  });

  const text = await res.text();

  if (res.ok) {
  // 👉 แสดงกล่องเขียว
  document.getElementById("successBox").classList.remove("hidden");

  // 👉 ซ่อน popup alert (ไม่ใช้แล้ว)

  // 👉 รอ 1.5 วิ แล้วค่อยกลับหน้า
  setTimeout(() => {
    window.location.href = "index.html";
  }, 1500);
} else {
  alert("เกิดข้อผิดพลาด: " + text);
}
}
</script>

</body>
</html>
