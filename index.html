<!DOCTYPE html>
<html>
<head>
  <title>My News</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/vue@3"></script>
</head>

<body class="bg-gray-100">

<div id="app">

  <!-- Navbar -->
  <div id="navbar"></div>
<div id="saveSuccessBox" 
     class="hidden max-w-xl mx-auto mt-6 bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded text-center">
  ⭐ บันทึกแล้วเรียบร้อย 🎉
</div>
  <!-- Hero -->
  <div class="bg-blue-600 text-white text-center py-10">
    <h2 class="text-3xl font-bold">ข่าวล่าสุดวันนี้</h2>
    <p class="mt-2">อัปเดตข่าวใหม่ทุกวัน</p>
  </div>

  <!-- News Grid -->
  <div class="p-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    
    <div v-for="n in news" :key="n.id"
      @click="goToNews(n.id)"
      :data-id="n.id"
      class="bg-white rounded-xl shadow-md overflow-hidden hover:shadow-xl transition cursor-pointer">

      <!-- Image -->
      <div class="relative">

  <!-- ปุ่ม 3 จุด -->
  <div class="absolute top-2 right-2">
    <button @click.stop="toggleMenu(n.id)" 
      class="bg-transparent p-1 rounded-full hover:bg-white/20 transition">
      ⋮
    </button>

    <!-- dropdown -->
    <div v-if="menuOpen === n.id" 
         class="absolute right-0 mt-2 w-32 bg-white rounded shadow-lg z-10">

      <button v-if="n.user_id === currentUserId" @click.stop="editNews(n.id)"
        class="block w-full text-left px-4 py-2 hover:bg-gray-100">
        ✏️ แก้ไข
      </button>

      <button v-if="n.user_id === currentUserId" @click.stop="deleteNews(n.id)"
        class="block w-full text-left px-4 py-2 text-red-500 hover:bg-gray-100">
        🗑 ลบ
      </button>

      <button v-if="n.user_id !== currentUserId" @click.stop="hideNews(n.id)"
        class="block w-full text-left px-4 py-2 text-orange-500 hover:bg-gray-100">
        🗑 ลบโพส
      </button>

      <button v-if="n.user_id !== currentUserId" @click.stop="reportNews(n.id)"
        class="block w-full text-left px-4 py-2 text-blue-500 hover:bg-gray-100">
        🚨 รายงาน
      </button>

    </div>
  </div>

  <!-- รูป -->
  <img :src="n.image ? 'assets/images/' + n.image : 'https://via.placeholder.com/300'"
       class="w-full h-48 object-cover">

  <div class="absolute bottom-0 bg-black bg-opacity-50 text-white p-2 w-full">
    ข่าวด่วน
  </div>

</div>

      <!-- Content -->
      <div class="p-4">
        <h2 class="text-lg font-bold mb-2">{{ n.title }}</h2>

        <p class="text-gray-600 text-sm">
          {{ n.content.substring(0, 80) }}...
        </p>

        <div class="flex justify-between items-center mt-4">
          
          <div class="flex gap-2">
            
            <button
              @click.stop="like(n.id)"
              class="bg-pink-500 text-white px-3 py-1 rounded hover:bg-pink-600 flex items-center gap-1">
              ❤️ {{ n.likes || 0 }}
            </button>

            <button
              @click.stop="save(n.id)"
              class="bg-yellow-500 text-white px-3 py-1 rounded hover:bg-yellow-600">
              ⭐
            </button>

          </div>

          <a :href="'news.html?id=' + n.id"
            class="text-blue-500 text-sm font-semibold hover:underline">
            อ่านต่อ →
          </a>

        </div>
      </div>

    </div>
  </div>

  <div class="flex flex-wrap justify-center gap-2 mt-6">
      <button @click="changePage(page - 1)"
        :disabled="page === 1"
        class="px-4 py-2 rounded-lg bg-slate-200 text-slate-700 enabled:hover:bg-slate-300 disabled:opacity-50">
        ก่อนหน้า
      </button>

      <button v-for="p in visiblePages" :key="p"
        @click="changePage(p)"
        :class="p === page ? 'bg-blue-600 text-white' : 'bg-white text-slate-700 hover:bg-slate-100'"
        class="px-4 py-2 rounded-lg border border-slate-200">
        {{ p }}
      </button>

      <button @click="changePage(page + 1)"
        :disabled="page === totalPages"
        class="px-4 py-2 rounded-lg bg-slate-200 text-slate-700 enabled:hover:bg-slate-300 disabled:opacity-50">
        ถัดไป
      </button>
    </div>

  </div>

</div>

<!-- ✅ MODAL ยืนยันลบ -->
<div id="confirmModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
  <div class="bg-white rounded-2xl p-6 w-80 text-center shadow-xl">
    <h2 class="text-lg font-semibold mb-4">ยืนยันการลบ</h2>
    <p class="text-gray-600 mb-6">ต้องการลบข่าวนี้?</p>

    <div class="flex justify-center gap-4">
      <button onclick="closeModal()" class="px-4 py-2 rounded bg-gray-200">
        ยกเลิก
      </button>
      <button id="confirmDeleteBtn" class="px-4 py-2 rounded bg-red-500 text-white">
        ลบ
      </button>
    </div>
  </div>
</div>

<script src="navbar.js"></script>

<script>
const { createApp } = Vue;

const app = createApp({
  data() {
    return {
      news: [],
      menuOpen: null,
      currentUserId: null,
      page: 1,
      pageSize: 10,
      totalPages: 1
    };
  },

  computed: {
    pageGroupStart() {
      return Math.floor((this.page - 1) / 3) * 3 + 1;
    },
    visiblePages() {
      const pages = [];
      const start = this.pageGroupStart;
      const end = Math.min(start + 2, this.totalPages);
      for (let i = start; i <= end; i++) pages.push(i);
      return pages;
    }
  },

  mounted() {
    if (!localStorage.getItem("login")) {
      window.location.href = "login.html";
      return;
    }

    const storedLogin = localStorage.getItem("login");
    const user = storedLogin ? JSON.parse(storedLogin) : null;
    this.currentUserId = Number(localStorage.getItem("userId")) || (user && Number(user.id));

    loadNavbar();
    this.loadNews(this.page);

    document.addEventListener("click", () => {
      this.menuOpen = null;
    });
  },

  methods: {
    toggleMenu(id) {
      this.menuOpen = this.menuOpen === id ? null : id;
    },

    editNews(id) {
      window.location.href = `edit.html?id=${id}`;
    },

    // 🔥 DELETE (แก้ให้มีสิทธิ์จริง)
    deleteNews(id) {
      deleteId = id;
      document.getElementById("confirmModal").classList.remove("hidden");
    },

    async loadNews(page = 1) {
      const res = await fetch(`http://localhost:3000/news?page=${page}&pageSize=${this.pageSize}`);
      const result = await res.json();

      const data = Array.isArray(result) ? result : result.data;
      this.news = data;

      if (!Array.isArray(result)) {
        this.page = result.page;
        this.totalPages = result.totalPages;
      } else {
        this.page = 1;
        this.totalPages = 1;
      }
    },

    changePage(page) {
      if (page < 1 || page > this.totalPages) return;
      this.loadNews(page);
    },

    // 🔥 LIKE (แก้ให้ถูก + มีสิทธิ์)
    async like(id) {
      const storedLogin = localStorage.getItem("login");
      const user = storedLogin ? JSON.parse(storedLogin) : null;
      const userId = localStorage.getItem("userId") || user?.id;

      if (!userId) {
        alert("กรุณา login");
        return;
      }

      const res = await fetch("http://localhost:3000/like", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ user_id: userId, news_id: id })
      });

      if (!res.ok) {
        const msg = await res.text();
        return alert("error: " + msg);
      }

      const data = await res.json();

      this.news = this.news.map(n =>
        n.id === id ? { ...n, likes: data.likes } : n
      );
    },

    // 🔥 SAVE (แก้ให้ใช้ header)
    async save(id) {
      const storedLogin = localStorage.getItem("login");
      const user = storedLogin ? JSON.parse(storedLogin) : null;
      const userId = localStorage.getItem("userId") || user?.id;

      if (!userId) {
        alert("กรุณา login");
        return;
      }

      const res = await fetch("http://localhost:3000/save", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ user_id: userId, news_id: id })
      });

      if (!res.ok) {
        const msg = await res.text();
        return alert("save error: " + msg);
      }

      const box = document.getElementById("saveSuccessBox");
      box.classList.remove("hidden");

      setTimeout(() => {
        box.classList.add("hidden");
      }, 2000);
    },

    goToNews(id) {
      window.location.href = `news.html?id=${id}`;
    },

    hideNews(id) {
      this.news = this.news.filter(n => n.id !== id);
    },

    reportNews(id) {
      window.location.href = `report.html?id=${id}`;
    }
  }
});

// ================== MODAL ==================
let deleteId = null;

function closeModal() {
  document.getElementById("confirmModal").classList.add("hidden");
  deleteId = null;
}

document.getElementById("confirmDeleteBtn").onclick = async () => {
  if (!deleteId) return;

  const storedLogin = localStorage.getItem("login");
  const user = storedLogin ? JSON.parse(storedLogin) : null;
  const userId = Number(localStorage.getItem("userId")) || (user && Number(user.id));

  if (!userId) {
    alert("กรุณา login");
    return;
  }

  const res = await fetch("http://localhost:3000/delete-news", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ news_id: deleteId, user_id: userId })
  });

  if (!res.ok) {
    const msg = await res.text();
    return alert("ลบไม่ได้: " + msg);
  }

  // ลบด้วย animation คล้าย saved.html
  const card = document.querySelector(`[data-id="${deleteId}"]`);
  if (card) {
    card.style.transition = "0.3s";
    card.style.opacity = "0";
    setTimeout(() => {
      app.news = app.news.filter(n => n.id !== deleteId);
    }, 300);
  } else {
    app.news = app.news.filter(n => n.id !== deleteId);
  }

  closeModal();
};

app.mount("#app");
</script>

</body>
</html>
