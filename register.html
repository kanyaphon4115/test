<!DOCTYPE html>
<html>
<head>
  <title>Register</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">

<div class="bg-white p-8 rounded-2xl shadow-lg w-80">
  <h2 class="text-2xl font-bold text-center mb-6">Register</h2>

  <input id="name" class="w-full p-2 mb-3 border rounded-lg" placeholder="Name">
  <input id="email" class="w-full p-2 mb-3 border rounded-lg" placeholder="Email">
  <input id="password" type="password" class="w-full p-2 mb-4 border rounded-lg" placeholder="Password">

  <button onclick="register()" class="w-full bg-blue-500 text-white py-2 rounded-lg hover:bg-green-600">
    Register
  </button>

  <p class="text-sm text-center mt-4">
    มีบัญชีแล้ว?
    <a href="login.html" class="text-blue-500">Login</a>
  </p>
</div>

<script>
async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const res = await fetch("http://localhost:3000/login", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ email, password })
  });

  const data = await res.text();

  if (data.includes("สำเร็จ")) {
    // ✅ redirect ไปหน้า index
    window.location.href = "index.html";
  } else {
    alert(data);
  }
}
</script>
</body>
</html>
